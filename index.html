<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="bg-remove-logo.png">
    <title>CyberX CTF Awards</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            base: '#030712', 
                            panel: '#0f172a',
                            border: '#1e293b',
                            accent: '#06b6d4',
                            glow: 'rgba(6, 182, 212, 0.4)',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030712;
            color: #f8fafc;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
        }

        .premium-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.2) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.2) 100%);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-premium {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            padding: 12px 16px;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
        }
        .input-premium:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
            background: rgba(6, 182, 212, 0.05);
        }

        .btn-premium {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.5);
        }
        
        .countdown-circle {
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: dash 12s linear forwards;
            transform-origin: center;
            transform: rotate(-90deg);
        }
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        .reveal-anim {
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .winner-card {
            position: relative;
        }
        .winner-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 17px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .winner-card:hover::before {
            opacity: 1;
        }
        .winner-1::before { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .winner-2::before { background: linear-gradient(135deg, #e2e8f0, #94a3b8); }
        .winner-3::before { background: linear-gradient(135deg, #fdba74, #b45309); }
        
        .rank-number {
            font-family: 'JetBrains Mono', monospace;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .rank-1-text { background-image: linear-gradient(135deg, #fcd34d 0%, #d97706 100%); }
        .rank-2-text { background-image: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%); }
        .rank-3-text { background-image: linear-gradient(135deg, #fdba74 0%, #b45309 100%); }
    </style>
</head>
<body>
    <div class="premium-grid"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CyberXLogo = ({ className = "h-20" }) => (
            <div className={`flex flex-col items-center justify-center ${className} drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]`}>
                <img src="bg-remove-logo.png" className="h-full object-contain filter brightness-110" alt="CyberX Logo" />
            </div>
        );

        const TrophyIcon = ({ size = 24, color = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
            </svg>
        );

        const PlayIcon = ({ size = 24, color = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
        );

        const UserIcon = ({ size = 24, color = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const Countdown = ({ onComplete }) => {
            const [count, setCount] = useState(12);
            const timerAudioRef = useRef(null);

            useEffect(() => {
                const audio = new Audio('sound/timer-sound.mp3');
                audio.loop = true;
                timerAudioRef.current = audio;
                
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(e => console.log("Audio play blocked:", e));
                }
                
                return () => {
                    if (timerAudioRef.current) {
                        timerAudioRef.current.pause();
                        timerAudioRef.current.currentTime = 0;
                    }
                };
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCount(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            onComplete();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [onComplete]);
            
            return (
                <div className="flex flex-col items-center justify-center h-screen w-full fixed top-0 left-0 z-[100] bg-[#030712] overflow-hidden">
                    {/* Background glow behind all elements */}
                    <div className="absolute w-[600px] h-[600px] bg-[#06b6d4] rounded-full blur-[180px] opacity-10 animate-pulse-slow"></div>
                    
                    <div className="relative flex flex-col items-center justify-center">
                        {/* The Large Circular Progress Indicator */}
                        <svg className="absolute w-[450px] h-[450px] md:w-[550px] md:h-[550px]" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth="0.5" />
                            <circle cx="50" cy="50" r="48" fill="none" stroke="#06b6d4" strokeWidth="1" strokeLinecap="round" className="countdown-circle opacity-60" />
                        </svg>

                        {/* Central Content Stack */}
                        <div className="z-10 flex flex-col items-center">
                            <CyberXLogo className="h-28 mb-8" />
                            <div className="h-px w-32 bg-gradient-to-r from-transparent via-cyber-accent to-transparent mb-6"></div>
                            <p className="text-cyber-accent font-mono text-sm tracking-[0.5em] mb-4 uppercase opacity-60">Decryption Sequence</p>
                            <h1 className="text-8xl font-mono font-bold text-white tracking-widest ml-4">
                                00:{count < 10 ? '0' + count : count}
                            </h1>
                            <p className="mt-4 font-mono text-[10px] text-slate-500 tracking-[0.2em] uppercase">Status: decrypting_winner_metadata... {Math.random().toString(36).substring(7).toUpperCase()}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const WinnerCard = ({ place, rank, player, delay, isRevealed, onAnimationEnd }) => {
            if (!isRevealed) return <div className="w-full max-w-sm hidden md:block opacity-0"></div>;
            
            let cardClasses = "glass-panel rounded-2xl p-8 flex flex-col items-center justify-center reveal-anim w-full max-w-sm mx-auto transition-all duration-500 hover:-translate-y-2 winner-card";
            let rankColor = "", medalName = "", rankTextClass = "";
            
            if (rank === 1) { 
                cardClasses += " winner-1 order-2 md:-translate-y-12 z-20 scale-105"; 
                rankColor = "#fbbf24"; 
                medalName = "CHAMPION";
                rankTextClass = "rank-1-text";
            } else if (rank === 2) { 
                cardClasses += " winner-2 order-1 md:translate-y-8 z-10"; 
                rankColor = "#94a3b8"; 
                medalName = "RUNNER UP";
                rankTextClass = "rank-2-text";
            } else { 
                cardClasses += " winner-3 order-3 md:translate-y-16 z-10"; 
                rankColor = "#b45309"; 
                medalName = "2ND RUNNER UP";
                rankTextClass = "rank-3-text";
            }
            
            return (
                <div className={cardClasses} style={{ animationDelay: `${delay}ms` }} onAnimationEnd={onAnimationEnd}>
                    <div className="absolute top-4 left-4 opacity-30 font-mono text-xs tracking-widest user-select-none">RANK_0{rank}</div>
                    <div className="absolute top-4 right-4 opacity-30 font-mono text-xs user-select-none">[{medalName}]</div>
                    
                    <div className="mt-6 mb-4 relative animate-float">
                        <div className="absolute inset-0 blur-xl opacity-30" style={{ backgroundColor: rankColor }}></div>
                        <TrophyIcon size={56} color={rankColor} />
                    </div>
                    
                    <h2 className={`text-5xl font-bold mb-2 ${rankTextClass} rank-number`}>
                        {rank}{rank === 1 ? 'st' : rank === 2 ? 'nd' : 'rd'}
                    </h2>
                    
                    <div className="mt-4 text-center w-full relative">
                        <h3 className="text-xs uppercase tracking-[0.2em] text-slate-400 mb-2 font-mono flex items-center justify-center gap-2">
                            <span className="w-4 h-px bg-slate-600"></span> OPERATIVE ALIAS <span className="w-4 h-px bg-slate-600"></span>
                        </h3>
                        <h4 className="text-3xl font-bold text-white tracking-wide mt-2 mb-2 break-all">{player}</h4>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ winners, setWinners, onStart }) => {
            const handleChange = (rank, value) => {
                setWinners(prev => ({ ...prev, [rank]: { ...prev[rank], player: value } }));
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative z-10 w-full overflow-y-auto">
                    <div className="glass-panel p-8 md:p-12 rounded-2xl max-w-5xl w-full relative z-20 my-12">
                        <div className="flex flex-col md:flex-row items-center justify-between mb-12 pb-6 border-b border-white/10 gap-6">
                            <CyberXLogo className="h-28" />
                            <div className="text-right">
                                <h1 className="text-2xl font-bold tracking-wider text-white">CTF AWARDS CONFIGURATION</h1>
                                <p className="text-cyber-accent text-sm font-mono mt-1 opacity-80">SYS.ADMIN // SECURE CONNECTION</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                            {[1, 2, 3].map(rank => (
                                <div key={rank} className="bg-white/5 rounded-xl p-6 border border-white/5 relative overflow-hidden group hover:border-white/10 transition-colors">
                                    <div className={`absolute top-0 left-0 w-full h-1 ${rank === 1 ? 'bg-gradient-to-r from-amber-400 to-amber-600' : rank === 2 ? 'bg-gradient-to-r from-slate-300 to-slate-500' : 'bg-gradient-to-r from-orange-400 to-orange-700'}`}></div>
                                    <h3 className="text-lg font-bold mb-6 text-white flex items-center gap-2 font-mono">
                                        <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${rank === 1 ? 'bg-amber-500/20 text-amber-400' : rank === 2 ? 'bg-slate-400/20 text-slate-300' : 'bg-orange-600/20 text-orange-400'}`}>
                                            {rank}
                                        </span> 
                                        {rank === 1 ? 'FIRST' : rank === 2 ? 'SECOND' : 'THIRD'} PLACE
                                    </h3>
                                    <div className="space-y-2">
                                        <label className="block text-xs text-slate-400 font-mono tracking-wider">OPERATIVE ALIAS</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                                                <UserIcon size={16} />
                                            </div>
                                            <input type="text" className="input-premium pl-10" value={winners[rank].player} onChange={(e) => handleChange(rank, e.target.value)} placeholder="Enter alias..." />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="flex justify-center border-t border-white/10 pt-8">
                            <button onClick={onStart} className="btn-premium flex items-center gap-3 text-lg">
                                <PlayIcon size={20} /> BEGIN CEREMONY
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const WinnerRevealStage = ({ winners }) => {
            const [revealed, setRevealed] = useState({ 3: false, 2: false, 1: false });
            const congratsAudioRef = useRef(new Audio('sound/congratulations.mp3'));
            
            useEffect(() => {
                const playCongrats = () => {
                    congratsAudioRef.current.currentTime = 0;
                    congratsAudioRef.current.play().catch(e => console.log("Congrats play blocked", e));
                };

                const t3 = setTimeout(() => {
                    setRevealed(prev => ({...prev, 3: true}));
                    playCongrats();
                }, 800);
                
                const t2 = setTimeout(() => {
                    setRevealed(prev => ({...prev, 2: true}));
                    playCongrats();
                }, 4500);
                
                const t1 = setTimeout(() => {
                    setRevealed(prev => ({...prev, 1: true}));
                    playCongrats();
                }, 9500);

                return () => { 
                    clearTimeout(t3); clearTimeout(t2); clearTimeout(t1); 
                    congratsAudioRef.current.pause();
                }
            }, []);

            const triggerConfetti = () => {
                if (window.confetti) {
                    const duration = 8000;
                    const end = Date.now() + duration;
                    const colors = ['#06b6d4', '#3b82f6', '#fbbf24', '#ffffff'];

                    (function frame() {
                        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                        if (Date.now() < end) requestAnimationFrame(frame);
                    }());
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative z-10 w-full overflow-hidden">
                    <div className="absolute top-8 w-full flex flex-col items-center z-20">
                        <CyberXLogo className="h-28 mb-6" />
                        <div className="h-px w-64 bg-gradient-to-r from-transparent via-cyber-accent to-transparent opacity-50"></div>
                        <p className="text-cyber-accent mt-4 font-mono text-sm tracking-[0.4em] uppercase opacity-80">Final Standings</p>
                    </div>
                    <div className="flex flex-col md:flex-row items-end justify-center gap-6 mt-32 w-full max-w-7xl h-auto md:h-[60vh] pb-12">
                        <WinnerCard rank={2} player={winners[2].player} delay={0} isRevealed={revealed[2]} />
                        <WinnerCard rank={1} player={winners[1].player} delay={0} isRevealed={revealed[1]} onAnimationEnd={triggerConfetti} />
                        <WinnerCard rank={3} player={winners[3].player} delay={0} isRevealed={revealed[3]} />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [stage, setStage] = useState('admin');
            const [winners, setWinners] = useState({
                1: { player: 'NULL_POINTER' },
                2: { player: 'SEGFAULT_KID' },
                3: { player: 'DROP_TABLES' }
            });
            return (
                <div className="min-h-screen w-full font-sans antialiased text-slate-200">
                    {stage === 'admin' && <AdminPanel winners={winners} setWinners={setWinners} onStart={() => {
                        console.log("Starting countdown...");
                        setStage('countdown');
                    }} />}
                    {stage === 'countdown' && <Countdown onComplete={() => {
                        console.log("Countdown complete, revealing winners...");
                        setStage('reveal');
                    }} />}
                    {stage === 'reveal' && <WinnerRevealStage winners={winners} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
