<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/bg-remove-logo.png">
    <title>The Last footprint Awards</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind custom theme config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            base:      '#383838', // Dark Grey
                            accent:    '#44a6cc', // Cyan / Light Blue
                            secondary: '#1c5070', // Dark Blue
                            alert:     '#ae0001', // Red
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float':      'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%':      { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (JSX transpiler) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Particle Network Canvas (sits behind everything) -->
    <canvas id="particle-canvas" class="particle-canvas"></canvas>
    <!-- React App Root -->
    <div id="root" style="position:relative;z-index:1;"></div>

    <!-- Particle Animation (plain JS — must run before React) -->
    <script src="particle.js"></script>
    <!-- React Application (JSX — transpiled by Babel) -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
